track: llama2_lfqa
dataset_path: data/lfqa/inputs.jsonl
output_dir: outputs/llama2_lfqa
model:
  name: meta-llama/Llama-2-7b-hf
  load_in_4bit: true
methods:
  - kgw
  - unigram
  - dipmark
  - hcw
  - heavywater
  - simplexwater
  - kuditipudi
  - semstamp
  - pmark
  - simmark
  - cgw
  - gaussmark
  - dawa
  - hybrid
attacks:
  - name: dipper
    strength: moderate
    condition: dipper_moderate
    model: kalpeshk2011/dipper-paraphraser-xxl
  - name: extreme-paraphrase
    strength: extreme
    condition: extreme_paraphrase
    model: facebook/bart-large-cnn
num_samples: 500
generation:
  max_new_tokens: 300
  temperature: 0.8
  top_p: 0.95
  top_k: 50
table:
  json: outputs/llama2_lfqa/tables/llama2_lfqa_table.json
  tex: outputs/llama2_lfqa/tables/llama2_lfqa_table.tex
